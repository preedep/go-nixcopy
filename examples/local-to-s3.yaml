# ตัวอย่าง: ถ่ายโอนจาก Local File System ไปยัง AWS S3
#
# Use Case: Backup ไฟล์จาก local disk ไปยัง S3
# เหมาะสำหรับ:
# - Backup ไฟล์จาก server/workstation ไปยัง cloud
# - Upload ผลลัพธ์จาก batch processing ไปยัง S3
# - Archive ข้อมูลเก่าไปยัง cloud storage

source:
  type: local
  local:
    base_path: /data/backups  # Base directory สำหรับ source files

destination:
  type: s3
  s3:
    region: ap-southeast-1
    bucket: my-backup-bucket
    auth_type: access_key
    access_key_id: AKIAIOSFODNN7EXAMPLE
    secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

transfer:
  buffer_size: 33554432      # 32MB buffer
  concurrent_files: 4         # ถ่ายโอน 4 ไฟล์พร้อมกัน
  retry_attempts: 3
  retry_delay: 5s
  timeout: 30m

logging:
  level: info
  format: json
  output_path: stdout
