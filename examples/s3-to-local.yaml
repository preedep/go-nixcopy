# ตัวอย่าง: ถ่ายโอนจาก AWS S3 ไปยัง Local File System
#
# Use Case: Download ไฟล์จาก S3 มาเก็บที่ local disk
# เหมาะสำหรับ:
# - Download backup จาก S3 เพื่อ restore
# - ดึงข้อมูลจาก S3 มา process ที่ local
# - Sync ข้อมูลจาก cloud มาเก็บที่ local

source:
  type: s3
  s3:
    region: ap-southeast-1
    bucket: my-source-bucket
    auth_type: access_key
    access_key_id: AKIAIOSFODNN7EXAMPLE
    secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

destination:
  type: local
  local:
    base_path: /data/downloads  # Directory ที่จะเก็บไฟล์ที่ download

transfer:
  buffer_size: 33554432      # 32MB buffer
  concurrent_files: 4         # ดึง 4 ไฟล์พร้อมกัน
  retry_attempts: 3
  retry_delay: 5s
  timeout: 30m

logging:
  level: info
  format: json
  output_path: stdout
