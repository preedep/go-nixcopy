# ตัวอย่าง: ถ่ายโอนจาก Azure Blob (ใช้ SAS Token) ไปยัง S3 (ใช้ Assume Role)

source:
  type: blob
  blob:
    account_name: sourcestorageaccount
    container_name: source-container
    auth_type: sas_token
    sas_token: "sv=2021-06-08&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2024-12-31T23:59:59Z&st=2024-01-01T00:00:00Z&spr=https&sig=SIGNATURE"

destination:
  type: s3
  s3:
    region: eu-west-1
    bucket: destination-bucket
    auth_type: assume_role
    role_arn: arn:aws:iam::123456789012:role/MyTransferRole
    role_session_name: nixcopy-session
    external_id: my-external-id  # optional

transfer:
  buffer_size: 33554432
  concurrent_files: 4
  retry_attempts: 3
  retry_delay: 5s
  timeout: 30m

logging:
  level: info
  format: json
  output_path: stdout
