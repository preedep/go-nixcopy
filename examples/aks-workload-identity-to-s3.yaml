# ตัวอย่าง: รันบน AKS (Kubernetes on Azure) → ถ่ายโอนไปยัง AWS S3
#
# สภาพแวดล้อม: Azure AKS with Workload Identity
# Source: Azure Blob (ใช้ Managed Identity/Workload Identity)
# Destination: S3 (ใช้ Access Key)
#
# Prerequisites:
# - AKS cluster with Workload Identity enabled
# - Service account with federated identity credential
# - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_FEDERATED_TOKEN_FILE env vars

source:
  type: blob
  blob:
    account_name: sourcestorageaccount
    container_name: source-container
    auth_type: managed_identity  # Workload Identity จะถูกใช้อัตโนมัติ
    client_id: ""  # จะอ่านจาก AZURE_CLIENT_ID env var

destination:
  type: s3
  s3:
    region: ap-southeast-1
    bucket: destination-bucket
    auth_type: access_key  # ต้องใช้ credentials (ไม่สามารถใช้ IAM role บน AKS)
    access_key_id: AKIAIOSFODNN7EXAMPLE
    secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

transfer:
  buffer_size: 33554432
  concurrent_files: 4
  retry_attempts: 3
  retry_delay: 5s
  timeout: 30m

logging:
  level: info
  format: json
  output_path: stdout
