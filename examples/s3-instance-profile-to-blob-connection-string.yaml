# ตัวอย่าง: ถ่ายโอนจาก S3 (ใช้ Instance Profile) ไปยัง Azure Blob (ใช้ Connection String)

source:
  type: s3
  s3:
    region: ap-northeast-1
    bucket: source-bucket
    auth_type: instance_profile  # ใช้ instance profile ของ EC2

destination:
  type: blob
  blob:
    auth_type: connection_string
    connection_string: "DefaultEndpointsProtocol=https;AccountName=mystorageaccount;AccountKey=YOUR_ACCOUNT_KEY;EndpointSuffix=core.windows.net"
    container_name: destination-container

transfer:
  buffer_size: 33554432
  concurrent_files: 4
  retry_attempts: 3
  retry_delay: 5s
  timeout: 30m

logging:
  level: info
  format: json
  output_path: stdout
